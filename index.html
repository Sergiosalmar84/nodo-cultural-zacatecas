<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#ffffff;--bg2:#f4f6fa;--bgc:#ffffff;--bgch:#f0f4ff;--brd:#e2e8f0;--brdl:#cbd5e1;--amb:#f97316;--ambl:#fb923c;--ambd:#ea580c;--terra:#dc2626;--gold:#d97706;--teal:#0d9488;--purp:#7c3aed;--grn:#16a34a;--txt:#111827;--txts:#4b5563;--txtm:#9ca3af;--shadow:0 2px 12px rgba(0,0,0,.07);--shadow-l:0 8px 32px rgba(0,0,0,.12);}
html,body{background:var(--bg);color:var(--txt);font-family:'freight-sans-pro','DM Sans',sans-serif;min-height:100%;-webkit-font-smoothing:antialiased;}
button{cursor:pointer;font-family:'freight-sans-pro','DM Sans',sans-serif;}input,textarea,select{font-family:'freight-sans-pro','DM Sans',sans-serif;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--amb)!important;}
select option{background:#ffffff;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:var(--bg2);}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px;}
/* SETUP / LANDING */
.setup-screen{position:fixed;inset:0;z-index:2000;background:linear-gradient(145deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
.setup-card{width:100%;max-width:460px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:36px;backdrop-filter:blur(12px);}
.setup-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.setup-logo-icon{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#c4611e,#8b2e18);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(196,97,30,.4);}
.setup-logo-dot{width:13px;height:13px;border-radius:50%;background:#fff;}
.setup-logo-title{font-family:'museo-sans','freight-display-pro','Playfair Display',sans-serif;font-size:36px;font-weight:700;color:#faf8f5;letter-spacing:5px;}
.setup-sub{font-size:10px;color:rgba(250,248,245,.35);letter-spacing:3px;font-family:'DM Mono',monospace;margin-top:2px;}
.setup-h2{font-family:'museo-sans','freight-display-pro','Playfair Display',sans-serif;font-size:22px;color:#faf8f5;margin-bottom:6px;}
.setup-p{font-size:13px;color:rgba(250,248,245,.55);line-height:1.65;margin-bottom:24px;}
.setup-label{display:block;font-size:10px;color:rgba(250,248,245,.4);letter-spacing:1.5px;margin-bottom:6px;font-family:'DM Mono',monospace;}
.setup-input{width:100%;padding:12px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#faf8f5;font-size:13px;margin-bottom:14px;}
.setup-input::placeholder{color:rgba(250,248,245,.3);}
.setup-input:focus{border-color:rgba(196,97,30,.6);outline:none;}
.setup-btn{width:100%;padding:13px;border:none;border-radius:11px;background:linear-gradient(135deg,#c4611e,#8b2e18);color:#fff;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(196,97,30,.35);margin-bottom:12px;}
.setup-btn:hover{opacity:.88;}
.setup-btn:disabled{opacity:.45;cursor:not-allowed;}
.setup-skip{width:100%;padding:10px;border:1px solid rgba(255,255,255,.12);border-radius:11px;background:transparent;color:rgba(250,248,245,.5);font-size:13px;cursor:pointer;}
.setup-skip:hover{background:rgba(255,255,255,.06);}
.setup-note{font-size:11px;color:rgba(250,248,245,.3);line-height:1.6;margin-top:14px;}
/* LANDING */
.landing{position:fixed;inset:0;z-index:1000;background:linear-gradient(145deg,#1a1208 0%,#2a1e0a 40%,#1a1208 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
.landing-grain{position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;}
.landing-wrap{width:100%;max-width:560px;position:relative;z-index:1;}
.landing-logo-row{display:flex;align-items:center;gap:13px;justify-content:center;margin-bottom:7px;}
.landing-icon{width:54px;height:54px;border-radius:15px;background:linear-gradient(135deg,#c4611e,#8b2e18);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(196,97,30,.45);}
.landing-icon-dot{width:15px;height:15px;border-radius:50%;background:#fff;box-shadow:0 0 14px rgba(255,255,255,.7);}
.landing-title{font-family:'museo-sans','freight-display-pro','Playfair Display',sans-serif;font-size:52px;font-weight:700;letter-spacing:6px;color:#faf8f5;}
.landing-sub{font-size:10px;color:rgba(250,248,245,.4);letter-spacing:4px;text-align:center;margin-bottom:44px;font-family:'DM Mono',monospace;}
.landing-q{font-family:'museo-sans','freight-display-pro','Playfair Display',sans-serif;font-size:24px;color:#faf8f5;text-align:center;margin-bottom:6px;}
.landing-hint{font-size:13px;color:rgba(250,248,245,.5);text-align:center;margin-bottom:28px;line-height:1.6;}
.role-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:28px;}
@media(max-width:560px){.role-cards{grid-template-columns:1fr;}}
.role-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:22px 16px;display:flex;flex-direction:column;align-items:center;gap:11px;cursor:pointer;transition:all .25s;text-align:center;backdrop-filter:blur(8px);}
.role-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.3);}
.role-card-icon{width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center;}
.role-card-title{font-family:'museo-sans','freight-display-pro','Playfair Display',sans-serif;font-size:18px;color:#faf8f5;}
.role-card-desc{font-size:12px;color:rgba(250,248,245,.5);line-height:1.5;}
.role-card-badge{font-size:9px;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:.5px;}
/* NAVBAR */
.navbar{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(250,248,245,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--brd);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:var(--shadow);}
.logo{display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;}
.logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--amb),var(--terra));display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(196,97,30,.3);}
.logo-dot{width:9px;height:9px;border-radius:50%;background:#fff;}
.logo-word{font-family:'museo-sans','freight-display-pro','Playfair Display',sans-serif;font-size:20px;font-weight:700;color:var(--txt);letter-spacing:2px;}
.logo-sub{font-size:9px;color:var(--txtm);letter-spacing:2px;font-family:'DM Mono',monospace;}
.nav-links{display:flex;gap:2px;}
.nav-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;border:none;background:transparent;color:var(--txts);font-size:13px;font-weight:500;transition:all .15s;}
.nav-btn:hover{background:var(--bg2);color:var(--txt);}
.nav-btn.active{background:rgba(196,97,30,.1);color:var(--amb);}
.nav-right{display:flex;align-items:center;gap:6px;position:relative;}
.icon-btn{padding:7px;border-radius:8px;border:none;background:transparent;color:var(--txts);display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative;}
.icon-btn:hover{background:var(--bg2);color:var(--txt);}
.notif-dot-pulse{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--amb);border:2px solid var(--bg);animation:pulse-dot 2s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:.4;}}
.notif-drop{position:absolute;top:calc(100% + 8px);right:0;width:310px;background:var(--bgc);border:1px solid var(--brd);border-radius:14px;box-shadow:var(--shadow-l);z-index:400;overflow:hidden;}
.notif-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--brd);}
.notif-hdr-title{font-family:'museo-sans','freight-display-pro','Playfair Display',sans-serif;font-size:17px;color:var(--txt);}
.notif-mark{font-size:11px;color:var(--amb);background:none;border:none;cursor:pointer;}
.notif-item{display:flex;gap:10px;padding:11px 16px;border-bottom:1px solid var(--brd);cursor:pointer;transition:background .15s;}
.notif-item:hover{background:var(--bg2);}
.notif-item.unread{background:rgba(196,97,30,.04);}
.notif-item:last-child{border-bottom:none;}
.notif-dot2{width:7px;height:7px;border-radius:50%;background:var(--amb);flex-shrink:0;margin-top:5px;}
.notif-text{font-size:12.5px;color:var(--txts);line-height:1.5;}
.notif-time{font-size:10px;color:var(--txtm);margin-top:2px;}
.btn-home-return{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:1px solid var(--brd);background:var(--bgc);color:var(--txts);font-size:12px;font-weight:500;transition:all .15s;}
.btn-home-return:hover{border-color:var(--amb);color:var(--amb);}
.user-pill{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border-radius:22px;background:var(--bgc);border:1px solid var(--brd);cursor:pointer;transition:all .15s;box-shadow:var(--shadow);}
.user-pill:hover{border-color:var(--amb);}
.user-pill-name{font-size:12px;color:var(--txt);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-drop{position:absolute;top:calc(100% + 8px);right:0;background:var(--bgc);border:1px solid var(--brd);border-radius:12px;padding:6px;min-width:180px;box-shadow:var(--shadow-l);z-index:300;}
.drop-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;border:none;background:none;color:var(--txts);font-size:13px;width:100%;text-align:left;cursor:pointer;transition:all .15s;}
.drop-item:hover{background:var(--bg2);color:var(--txt);}
.drop-item.danger{color:#c0392b;}
.drop-sep{height:1px;background:var(--brd);margin:4px 0;}
.role-badge-nav{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600;}
.btn-join{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--amb),var(--terra));color:#fff;font-size:13px;font-weight:600;transition:opacity .2s;box-shadow:0 3px 10px rgba(196,97,30,.25);}
.btn-join:hover{opacity:.85;}
/* BOTTOM NAV */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(250,248,245,.97);backdrop-filter:blur(20px);border-top:1px solid var(--brd);padding:6px 0 14px;justify-content:space-around;}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--txtm);padding:4px 10px;font-size:10px;transition:color .15s;}
.bnav-btn.active{color:var(--amb);}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(26,21,16,.6);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-card{background:var(--bgc);border:1px solid var(--brd);border-radius:20px;padding:28px;width:100%;max-width:440px;position:relative;box-shadow:var(--shadow-l);max-height:90vh;overflow-y:auto;}
.modal-close{position:absolute;top:14px;right:14px;background:var(--bg2);border:none;border-radius:8px;padding:6px;color:var(--txts);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.modal-tabs{display:flex;background:var(--bg2);border-radius:10px;padding:3px;margin-bottom:22px;}
.modal-tab{flex:1;padding:8px;border:none;border-radius:8px;background:transparent;color:var(--txts);font-size:13px;font-weight:500;transition:all .2s;cursor:pointer;}
.modal-tab.active{background:var(--bgc);color:var(--txt);font-weight:600;box-shadow:var(--shadow);}
.auth-error{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.25);border-radius:8px;padding:9px 13px;color:#c0392b;font-size:13px;margin-bottom:14px;}
/* FORMS */
.field-label{display:block;font-size:10px;color:var(--txtm);letter-spacing:1.5px;margin-bottom:5px;font-family:'DM Mono',monospace;text-transform:uppercase;}
.field-input{width:100%;padding:11px 13px;background:var(--bg);border:1px solid var(--brd);border-radius:9px;color:var(--txt);font-size:14px;transition:border-color .2s;}
.field-input::placeholder{color:var(--txtm);}
.field-input.pl{padding-left:36px;}
.field-textarea{width:100%;padding:11px 13px;background:var(--bg);border:1px solid var(--brd);border-radius:9px;color:var(--txt);font-size:13px;line-height:1.65;resize:vertical;transition:border-color .2s;}
.field-select{width:100%;padding:11px 13px;background:var(--bg);border:1px solid var(--brd);border-radius:9px;color:var(--txt);font-size:14px;appearance:none;cursor:pointer;}
.field-wrap{position:relative;}
.field-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);}
.field-group{display:flex;flex-direction:column;gap:14px;margin-bottom:18px;}
.btn-primary{width:100%;padding:13px;border:none;border-radius:11px;background:linear-gradient(135deg,var(--amb),var(--terra));color:#fff;font-size:14px;font-weight:600;transition:opacity .2s;cursor:pointer;box-shadow:0 4px 14px rgba(196,97,30,.25);}
.btn-primary:hover{opacity:.88;}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;}
/* VIEWS */
.view{padding-top:58px;min-height:100vh;}
/* HERO */
.hero{padding:52px 24px 44px;background:linear-gradient(160deg,var(--bg2) 0%,var(--bg) 60%);border-bottom:1px solid var(--brd);text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c4611e' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none;}
.hero-label{font-size:10px;color:var(--amb);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;font-family:'DM Mono',monospace;}
.hero-h1{font-family:'museo-sans','freight-display-pro','Playfair Display',sans-serif;font-size:clamp(28px,6vw,56px);font-weight:700;color:var(--txt);line-height:1.06;margin-bottom:18px;}
.hero-h1 em{color:var(--amb);font-style:italic;}
.hero-p{color:var(--txts);font-size:15px;max-width:480px;margin:0 auto 30px;line-height:1.7;}
.search-bar{max-width:500px;margin:0 auto;position:relative;}
.search-bar input{width:100%;padding:14px 18px 14px 48px;background:var(--bgc);border:1px solid var(--brd);border-radius:14px;color:var(--txt);font-size:14px;box-shadow:var(--shadow);}
.search-bar input:focus{border-color:var(--amb);box-shadow:0 0 0 3px rgba(196,97,30,.1);}
.search-ico{position:absolute;left:15px;top:50%;transform:translateY(-50%);}
.hero-stats{display:flex;justify-content:center;gap:36px;margin-top:32px;flex-wrap:wrap;}
.stat-item{text-align:center;}
.stat-num{font-family:'museo-sans','freight-display-pro','Playfair Display',sans-serif;font-size:34px;font-weight:700;color:var(--amb);}
.stat-lbl{font-size:10px;color:var(--txtm);letter-spacing:1px;margin-top:2px;font-family:'DM Mono',monospace;}
/* HOME */
.home-wrap{max-width:1140px;margin:0 auto;padding:32px 20px 100px;}
.home-grid{display:grid;grid-template-columns:1fr 310px;gap:24px;}
.section-title{font-family:'museo-sans','freight-display-pro','Playfair Display',sans-serif;font-size:24px;color:var(--txt);}
.section-title em{color:var(--amb);font-style:italic;}
.feed-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.link-btn{background:none;border:none;color:var(--amb);font-size:13px;cursor:pointer;font-weight:500;}
.post-card{background:var(--bgc);border:1px solid var(--brd);border-radius:16px;padding:20px;margin-bottom:16px;transition:all .2s;box-shadow:var(--shadow);}
.post-card:hover{border-color:var(--amb);box-shadow:var(--shadow-l);}
.post-head{display:flex;align-items:center;gap:11px;margin-bottom:14px;}
.post-body{color:var(--txts);font-size:13.5px;line-height:1.7;margin-bottom:15px;}
.post-actions{display:flex;gap:18px;padding-top:12px;border-top:1px solid var(--brd);align-items:center;}
.act-btn{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--txtm);font-size:13px;transition:color .15s;padding:3px;cursor:pointer;}
.act-btn:hover{color:var(--txt);}
.act-btn.liked{color:#c0392b;}
.sidebar-card{background:var(--bgc);border:1px solid var(--brd);border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:var(--shadow);}
.sidebar-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--brd);cursor:pointer;transition:opacity .15s;}
.sidebar-row:last-of-type{border-bottom:none;}
.sidebar-row:hover{opacity:.75;}
.ev-item{padding:9px 0;border-bottom:1px solid var(--brd);}
.ev-item:last-child{border-bottom:none;}
.ev-title{color:var(--txt);font-size:13px;font-weight:500;margin-bottom:3px;}
.ev-date{font-size:11px;color:var(--amb);font-family:'DM Mono',monospace;}
.ev-venue{font-size:11px;color:var(--txtm);margin-left:6px;}
/* GALLERY */
.gallery-section{border-top:1px solid var(--brd);padding:36px 0 0;}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px;margin-top:20px;}
.gallery-card{background:var(--bgc);border:1px solid var(--brd);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);}
.gallery-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-l);}
.gallery-thumb{height:140px;background:var(--bg2);position:relative;overflow:hidden;}
.gallery-thumb img{width:100%;height:100%;object-fit:cover;}
.gallery-card-body{padding:10px 12px 12px;}
.gallery-card-title{font-family:'museo-sans','freight-display-pro',sans-serif;font-size:15px;font-weight:700;color:var(--txt);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;}
.gallery-card-sub{font-size:11px;color:var(--amb);font-weight:600;letter-spacing:.3px;display:flex;align-items:center;gap:4px;cursor:pointer;}
.gallery-card-sub:hover{opacity:.8;}

  del(k){try{localStorage.removeItem('nodo_'+k);return true;}catch{return false;}},
};

    return LS.get(shared?'s_'+key:key);
  },
  async set(key,val,shared=false){
    if(_fbReady&&shared){
      try{await _db.collection('nodo').doc(key).set({v:val,ts:Date.now()});return true;}catch(e){console.warn('Firestore write failed',e);}

  },
  async del(key,shared=false){
    if(_fbReady&&shared){try{await _db.collection('nodo').doc(key).delete();}catch{}}

  },
};

  if(!_fbReady||!_storage)return base64;

    await ref.putString(base64,'data_url');

/* ── PROFILE RATING COMPONENT ── */
const ProfileRating=({p,currentUser,onUpdateProfile,onAuthClick})=>{
  const myLike=(p.likedBy||[]).includes(currentUser?.id);
  const [hoveredStar,setHoveredStar]=useState(0);
  const myRating=(p.userRatings||{})[currentUser?.id]||0;
  const avgRating=p.rating||0;
  const totalRatings=Object.keys(p.userRatings||{}).length;

  const toggleLike=async()=>{
    if(!currentUser||currentUser.role==='visitor'){onAuthClick('login');return;}
    if(currentUser.id===p.userId){return;}
    const likedBy=p.likedBy||[];
    const newLikedBy=myLike?likedBy.filter(id=>id!==currentUser.id):[...likedBy,currentUser.id];
    onUpdateProfile({...p,likedBy:newLikedBy,conns:newLikedBy.length});
  };

  const setRating=async(stars)=>{
    if(!currentUser||currentUser.role==='visitor'){onAuthClick('login');return;}
    if(currentUser.id===p.userId){return;}
    const userRatings={...(p.userRatings||{}),[currentUser.id]:stars};
    const vals=Object.values(userRatings);
    const avg=vals.length>0?Math.round((vals.reduce((a,b)=>a+b,0)/vals.length)*10)/10:0;
    onUpdateProfile({...p,userRatings,rating:avg});
  };

  const El=React.createElement;
  return El('div',{style:{background:'var(--bgc)',border:'1px solid var(--brd)',borderRadius:16,padding:'20px 22px',marginBottom:18,display:'flex',gap:24,alignItems:'center',flexWrap:'wrap'}},
    /* Likes */
    El('div',{style:{display:'flex',alignItems:'center',gap:10}},
      El('button',{onClick:toggleLike,disabled:!currentUser||currentUser.role==='visitor'||currentUser.id===p.userId,style:{
        display:'flex',alignItems:'center',gap:7,padding:'10px 18px',borderRadius:30,
        border:'2px solid '+(myLike?'#e11d48':'var(--brd)'),
        background:myLike?'rgba(225,29,72,.08)':'transparent',
        color:myLike?'#e11d48':'var(--txts)',
        fontSize:14,fontWeight:600,cursor:currentUser&&currentUser.id!==p.userId?'pointer':'default',
        transition:'all .2s'
      }},
        El('span',{style:{fontSize:18}},myLike?'❤️':'🤍'),
        El('span',null,(p.likedBy||[]).length),
        El('span',{style:{fontSize:12,color:'var(--txtm)'}},'Me gusta')
      )
    ),
    /* Star rating */
    El('div',{style:{display:'flex',alignItems:'center',gap:8}},
      El('div',{style:{display:'flex',gap:3}},
        [1,2,3,4,5].map(star=>El('button',{key:star,
          onMouseEnter:()=>currentUser&&currentUser.id!==p.userId&&setHoveredStar(star),
          onMouseLeave:()=>setHoveredStar(0),
          onClick:()=>setRating(star),
          disabled:!currentUser||currentUser.role==='visitor'||currentUser.id===p.userId,
          style:{
            background:'none',border:'none',fontSize:22,cursor:currentUser&&currentUser.id!==p.userId?'pointer':'default',
            color:(hoveredStar||myRating)>=star?'#f59e0b':'#d1d5db',
            transition:'color .1s',padding:'0 1px'
          }
        },'★'))
      ),
      El('div',{style:{display:'flex',flexDirection:'column'}},
        El('div',{style:{fontSize:16,fontWeight:700,color:'var(--txt)'}},(avgRating||0).toFixed(1),' ',El('span',{style:{fontSize:11,color:'var(--txtm)',fontWeight:400}},'/ 5.0')),
        El('div',{style:{fontSize:11,color:'var(--txtm)'}},totalRatings,' calificación'+(totalRatings!==1?'es':''))
      )
    ),
    /* Message for own profile */
    currentUser&&currentUser.id===p.userId&&El('div',{style:{fontSize:12,color:'var(--txtm)',fontStyle:'italic'}},'Las valoraciones las dan otros usuarios de la red.')
  );
};


/* ── HOME CAROUSEL ── */
const HomeCarousel=({profiles,go,setProf})=>{
  const [idx,setIdx]=useState(0);
  const [paused,setPaused]=useState(false);
  const timerRef=useRef(null);

  /* Build carousel items from profiles */
  const items=useMemo(()=>{
    const out=[];
    /* New profiles */
    [...profiles].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')).slice(0,6).forEach(p=>{
      out.push({type:'perfil',profile:p,title:p.name,subtitle:p.bio,img:p.photo,color:catInfo(p.cat).color,label:catInfo(p.cat).label});
    });
    /* Photos from portfolio */
    profiles.forEach(p=>{
      (p.portfolio||[]).filter(i=>i.type==='photo'&&i.url).slice(0,2).forEach(item=>{
        out.push({type:'foto',profile:p,title:item.title||'Nueva fotografía',subtitle:'por '+p.name,img:item.url,color:catInfo(p.cat).color,label:'Fotografía'});
      });
    });
    /* Music */
    profiles.filter(p=>p.musicUrl).forEach(p=>{
      out.push({type:'musica',profile:p,title:'Escucha a '+p.name,subtitle:p.musicUrl.includes('spotify')?'En Spotify':'En SoundCloud',img:null,color:p.musicUrl.includes('spotify')?'#1DB954':'#ff5500',label:p.musicUrl.includes('spotify')?'Spotify':'SoundCloud',emoji:p.musicUrl.includes('spotify')?'🎵':'🎧',link:p.musicUrl});
    });
    /* Convocatorias */
    profiles.forEach(p=>{
      (p.convocatorias||[]).slice(0,1).forEach(c=>{
        out.push({type:'convocatoria',profile:p,title:c.title,subtitle:'Publicada por '+p.name+' · '+muniName(p.muni),img:c.img||null,color:'#7c3aed',label:'Convocatoria',emoji:'📢'});
      });
    });
    /* Crowdfunding */
    profiles.forEach(p=>{
      (p.proyectos||[]).filter(pr=>pr.goal&&(pr.raised||0)<pr.goal).slice(0,1).forEach(pr=>{
        const pct=Math.min(99,Math.round(((pr.raised||0)/(pr.goal||1))*100));
        out.push({type:'antorcha',profile:p,title:pr.title,subtitle:p.name+' · '+pct+'% alcanzado de $'+pr.goal.toLocaleString()+' MXN',img:p.photo,color:'#f97316',label:'🔥 Antorcha activa',pct});
      });
    });
    /* Shuffle and limit */
    return out.sort(()=>Math.random()-.4).slice(0,Math.min(out.length,20));
  },[profiles]);

  const total=items.length;

  useEffect(()=>{
    if(total<=1||paused)return;
    timerRef.current=setInterval(()=>setIdx(i=>(i+1)%total),2000);
    return()=>clearInterval(timerRef.current);
  },[total,paused]);

  const prev=()=>{setIdx(i=>(i-1+total)%total);};
  const next=()=>{setIdx(i=>(i+1)%total);};

  if(total===0)return null;

  const item=items[idx]||items[0];
  const cat=catInfo(item.profile?.cat);

  const El=React.createElement;
  return El('div',{className:'carousel-section',
    onMouseEnter:()=>setPaused(true),
    onMouseLeave:()=>setPaused(false)},
    El('div',{className:'carousel-track',style:{transform:`translateX(-${idx*100}%)`}},
      items.map((it,i)=>{
        const c=catInfo(it.profile?.cat);
        return El('div',{key:i,className:'carousel-slide'},
          El('div',{className:'carousel-inner',onClick:()=>{if(it.profile){setProf(it.profile);go('profile');}},style:{cursor:it.profile?'pointer':'default'}},
            /* Visual */
            it.type==='musica'
              ?El('div',{className:'carousel-music-card',style:{background:it.color}},
                  El('div',{style:{fontSize:52}},'🎵'),
                  El('div',{style:{fontSize:11,color:'rgba(255,255,255,.8)',fontWeight:700,letterSpacing:2}},(it.label||'MÚSICA').toUpperCase())
                )
              :it.type==='antorcha'
                ?El('div',{className:'carousel-music-card',style:{background:'linear-gradient(135deg,#7c2d12,#f97316)'}},
                    El('div',{style:{fontSize:52}},'🔥'),
                    El('div',{style:{width:'80%'}},
                      El('div',{style:{height:5,background:'rgba(255,255,255,.2)',borderRadius:20,overflow:'hidden'}},
                        El('div',{style:{height:'100%',background:'#fff',width:(it.pct||0)+'%',borderRadius:20}})
                      )
                    ),
                    El('div',{style:{fontSize:10,color:'rgba(255,255,255,.8)',fontWeight:700}},(it.pct||0)+'% alcanzado')
                  )
              :it.type==='convocatoria'
                ?El('div',{className:'carousel-music-card',style:{background:'linear-gradient(135deg,#5b21b6,#7c3aed)'}},
                    El('div',{style:{fontSize:52}},'📢'),
                    El('div',{style:{fontSize:11,color:'rgba(255,255,255,.8)',fontWeight:700,letterSpacing:1}},it.profile?catInfo(it.profile.cat).label.toUpperCase():'')
                  )
              :it.img
                ?El('img',{src:it.img,className:'carousel-img',alt:it.title,onError:e=>{e.target.style.display='none';}})
                :El('div',{className:'carousel-img-placeholder',style:{background:it.color+'22',border:'2px solid '+it.color+'33'}},
                    El('div',{style:{fontFamily:'museo-sans,sans-serif',fontSize:40,fontWeight:900,color:it.color}},
                      (it.title||'?')[0]?.toUpperCase()
                    )
                  ),
            /* Body */
            El('div',{className:'carousel-body'},
              El('div',{className:'carousel-type',style:{color:it.color}},it.label||''),
              El('div',{className:'carousel-title'},it.profile?it.profile.name:it.title),
              El('div',{style:{fontSize:13,color:'var(--txts)',margin:'4px 0 8px',lineHeight:1.5}},it.type==='perfil'?it.subtitle:(it.type==='foto'||it.type==='video')?it.title:it.subtitle||''),
              El('div',{className:'carousel-meta'},
                El('div',{className:'carousel-cat-dot',style:{background:c.color}}),
                El('span',null,it.profile?c.label:''),
                it.profile&&El('span',{style:{color:c.color,fontSize:11}},muniName(it.profile.muni))
              ),
              it.type==='musica'&&it.link&&El('a',{href:it.link,target:'_blank',rel:'noopener noreferrer',onClick:e=>e.stopPropagation(),style:{display:'inline-flex',alignItems:'center',gap:6,marginTop:12,padding:'8px 16px',background:it.color,borderRadius:20,color:'#fff',fontSize:12,fontWeight:600,textDecoration:'none'}},
                El('span',null,'▶'),El('span',null,'Escuchar ahora')
              ),
              it.type==='antorcha'&&El('div',{style:{marginTop:12,display:'inline-flex',alignItems:'center',gap:6,padding:'8px 16px',background:'rgba(249,115,22,.1)',border:'1px solid rgba(249,115,22,.3)',borderRadius:20,color:'#f97316',fontSize:12,fontWeight:600}},
                '🔥 Apoyar este proyecto'
              )
            )
          )
        );
      })
    ),
    /* Arrows */
    El('div',{className:'carousel-arrows'},
      El('button',{className:'carousel-arrow',onClick:e=>{e.stopPropagation();prev();}},
        El(Ic,{n:'arrow_l',size:16,color:'var(--txts)'})
      ),
      El('button',{className:'carousel-arrow',onClick:e=>{e.stopPropagation();next();}},
        El(Ic,{n:'arrow_l',size:16,color:'var(--txts)',style:{transform:'rotate(180deg)'}})
      )
    ),
    /* Dots */
    El('div',{className:'carousel-dots'},
      items.slice(0,Math.min(items.length,12)).map((_,i)=>El('div',{key:i,className:'carousel-dot'+(i===idx?' active':''),onClick:()=>setIdx(i)}))
    )
  );
};

/* ── MAP PAGE — Leaflet + OpenStreetMap (free, no API key) ── */
const MapPage=({profiles,go,setProf,setOpenChatWith,currentUser})=>{
  const mapRef=useRef(null);
  const leafletRef=useRef(null);
  const markersRef=useRef([]);
  const popupRef=useRef(null);
  const [catFilter,setCatFilter]=useState('all');
  const [muniFilter,setMuniFilter]=useState('all');
  const [queryFilter,setQueryFilter]=useState('');
  const [panelOpen,setPanelOpen]=useState(window.innerWidth>768);
  const [zoom,setZoom]=useState(8);

  const filtered=useMemo(()=>profiles.filter(p=>!p.hidden).filter(p=>{
    const mc=catFilter==='all'||p.cat===catFilter;
    const mm=muniFilter==='all'||p.muni===muniFilter;
    const mq=!queryFilter||p.name.toLowerCase().includes(queryFilter.toLowerCase())||muniName(p.muni).toLowerCase().includes(queryFilter.toLowerCase())||p.bio.toLowerCase().includes(queryFilter.toLowerCase());

const HomePage=({profiles,posts,go,setProf,currentUser,onAuthClick})=>{
  const [homeTab,setHomeTab]=useState('feed');

  /* Crowdfunding campaigns sorted by % to goal — closest first */
  const activeCampaigns=useMemo(()=>{
    const items=[];
    profiles.forEach(p=>{
      if(['casa','espacio','galeria'].includes(p.cat))return;
      (p.proyectos||[]).forEach(proy=>{
        if(!proy.goal||proy.goal<=0)return;
        const raised=proy.raised||0;
        if(raised>=proy.goal)return; // already funded
        const pct=Math.min(99,Math.round((raised/proy.goal)*100));
        items.push({p,proy,pct});
      });
    });
    return items.sort((a,b)=>b.pct-a.pct).slice(0,6);
  },[profiles]);
  const allContent=useMemo(()=>{
    /* Sort profiles newest first (prioritize recent registrations) */
    const sorted=[...profiles].filter(p=>!p.isDemo).sort((a,b)=>(b.createdAt||b.joinedAt||'').localeCompare(a.createdAt||a.joinedAt||''));
    const items=[];
    /* First: add NEW profiles (no portfolio yet) as profile cards */
    sorted.slice(0,8).forEach(p=>{
      items.push({type:'perfil',url:p.photo||null,profileName:p.name,profileCat:p.cat,pid:p.id,prof:p,title:p.name});
    });
    /* Then: add content from ALL profiles */

/* ── ROOT APP ── */
function App(){
  const [loaded,setLoaded]=useState(false);
  const [landing,setLanding]=useState(true);
  const [view,setView]=useState('home');
  const [profiles,setProfiles]=useState([]);
  const [posts,setPosts]=useState([]);
  const [users,setUsers]=useState([]);
  const [currentUser,setCurrentUser]=useState(null);
  const [selProf,setSelProf]=useState(null);
  const [toast,setToast]=useState(null);
  const [notifs,setNotifs]=useState([]);
  const [showAuth,setShowAuth]=useState(false);
  const [authMode,setAuthMode]=useState('login');
  const [openChatWith,setOpenChatWith]=useState(null);
  const [announcement,setAnnouncement]=useState(null);

  /* ── Load from storage on mount ── */
  useEffect(()=>{
    (async()=>{
      try{
        const pData=await DB.get('profiles',true);
        const uData=await DB.get('users',true);
        const postData=await DB.get('posts',true);
        const seeded=await DB.get('nodo_seeded',true);
        if(!seeded){
          const sp=pData&&pData.length>0?pData:DEMO_PROFILES;
          const spost=postData&&postData.length>0?postData:DEMO_POSTS;
          setProfiles(sp);setPosts(spost);
          await DB.set('profiles',sp,true);
          await DB.set('posts',spost,true);
          await DB.set('nodo_seeded',true,true);
        }else{
          if(pData)setProfiles(pData);
          if(postData)setPosts(postData);
        }
        if(uData)setUsers(uData);
        const sessData=await DB.get('session');
        if(sessData){
          setCurrentUser(sessData);
          const nKey=sessData.role==='admin'?'notifs:admin':'notifs:'+sessData.id;
          const n=await DB.get(nKey);setNotifs(n||[]);
          setLanding(false);
        }
      }catch(e){console.warn('Load error',e);}
      setLoaded(true);
    })();
  },[]);

  /* Profiles auto-save disabled — saved explicitly on each mutation to avoid race conditions */
  useEffect(()=>{if(loaded)DB.set('posts',posts,true);},[posts,loaded]);
  useEffect(()=>{if(loaded&&users.length>0)DB.set('users',users,true);},[users,loaded]);

  /* ── Real-time Firestore listener — starts immediately, no dependency on loaded ── */
  useEffect(()=>{
    if(!_fbReady)return;
    let unsub=()=>{};
    const startListener=()=>{
      unsub=_db.collection('nodo').doc('profiles').onSnapshot(snap=>{
        if(snap.exists){
          const data=snap.data();
          if(data&&data.v&&Array.isArray(data.v)){
            /* Auto-approve any pending profiles silently */
            const autoPassed=data.v.map(p=>p.status==='pending'?{...p,status:'approved',approvedAt:p.approvedAt||fmtDate(),verified:true}:p);
            const changed=autoPassed.some((p,i)=>p.status!==data.v[i]?.status);
            if(changed)_db.collection('nodo').doc('profiles').set({v:autoPassed,ts:Date.now()}).catch(()=>{});
            setProfiles(prev=>{
              if(JSON.stringify(prev)===JSON.stringify(autoPassed))return prev;
              return autoPassed;
            });
          }
        }
      },err=>{
        console.warn('Profiles listener error',err);
        /* Retry after 5s */
        setTimeout(startListener,5000);
      });
    };
    /* Start immediately and also retry when tab becomes visible */
    startListener();
    const onVisible=()=>{if(!document.hidden)startListener();};
    document.addEventListener('visibilitychange',onVisible);
    return()=>{unsub();document.removeEventListener('visibilitychange',onVisible);};
  },[_fbReady]);

  /* Force reload profiles from Firestore */
  /* ── SYNC: Read users from Firebase and create missing profiles ── */
  const syncFirebaseUsers=async()=>{
    if(!_fbReady||!_db){showToast('Firebase no disponible');return;}
    showToast('⏳ Buscando usuarios en Firebase...');
    let added=0;
    try{
      /* Step 1: Load current profiles using transaction */
      const profRef=_db.collection('nodo').doc('profiles');
      const profSnap=await profRef.get();
      const currentProfiles=profSnap.exists?(profSnap.data().v||[]):[];
      let newProfiles=[...currentProfiles];

      const makeProfile=(u)=>({
        id:'sync_'+(u.id||u.uid||Date.now()),
        userId:u.id||u.uid||'',
        name:u.name||u.displayName||u.email?.split('@')[0]||'Usuario',
        cat:u.cat||'artista',cats:u.cats||[u.cat||'artista'],
        email:u.email||'',phone:u.phone||'',
        bio:'',sobre:'',tags:[],muni:u.muni||'zac',cp:'',
        photo:u.photo||u.photoURL||null,portfolio:[],convocatorias:[],proyectos:[],
        status:'pending',approvedAt:null,verified:false,isDemo:false,isAutoProfile:true,
        createdAt:u.joinedAt||u.createdAt||fmtDate(),joinedAt:u.joinedAt||fmtDate(),
        conns:0,views:0,rating:0,cg:['#1a1720','#09080a'],likedBy:[],userRatings:{},
      });

      const addIfMissing=(u)=>{
        if(!u||(!(u.name||u.email)))return;
        const id=u.id||u.uid||'';
        const em=u.email||'';
        const has=newProfiles.some(p=>
          (id&&(p.userId===id||p.id==='sync_'+id||p.id==='reg_'+id))||
          (em&&p.email===em)
        );
        if(!has){newProfiles.unshift(makeProfile(u));added++;}
      };

      /* Step 2: Read from users/{uid} collection */
      try{
        const usersSnap=await _db.collection('users').get();
        usersSnap.docs.forEach(d=>addIfMissing({...d.data(),id:d.id}));
        console.log('users collection:',usersSnap.size,'docs');
      }catch(e1){console.warn('Could not read users collection:',e1.message);}

      /* Step 3: Read from nodo_pending collection (fallback registrations) */
      try{
        const pendSnap=await _db.collection('nodo_pending').get();
        pendSnap.docs.forEach(d=>addIfMissing({...d.data(),id:d.id}));
        console.log('nodo_pending:',pendSnap.size,'docs');
      }catch(e2){console.warn('Could not read nodo_pending:',e2.message);}

      /* Step 4: Read nodo/users (app's own user list) */
      try{
        const nuSnap=await _db.collection('nodo').doc('users').get();
        if(nuSnap.exists){
          const arr=nuSnap.data().v||[];
          arr.forEach(u=>addIfMissing(u));
          console.log('nodo/users:',arr.length,'entries');
        }
      }catch(e3){console.warn('Could not read nodo/users:',e3.message);}

      /* Step 5: Save merged profiles if anything was added */
      if(added>0){
        await profRef.set({v:newProfiles,ts:Date.now()});

      }
    }catch(mainErr){
      console.error('Sync main error:',mainErr);
      showToast('⚠ Error: '+mainErr.message+' — revisa la consola');
    }
  };
  const forceReloadProfiles=async()=>{
    if(!_fbReady)return;

      const snap=await _db.collection('nodo').doc('profiles').get();

    }catch(e){showToast('Error al cargar desde Firebase');}

  const [viewHistory,setViewHistory]=useState(['home']);

    setPosts(prev=>[newPost,...prev].slice(0,100));
  };

  const updateProfile=async(u)=>{

  const onHide=async(id)=>{
    const np=profiles.map(p=>p.id===id?{...p,hidden:!p.hidden}:p);

  const onBlock=async(id)=>{
    const np=profiles.map(p=>p.id===id?{...p,blocked:!p.blocked,status:p.blocked?'pending':'blocked'}:p);

    try{await DB.set('profiles',np,true);}catch(e){}
    const updated=np.find(p=>p.id===id);
    showToast(updated?.blocked?'Perfil bloqueado: '+updated.name:'Perfil desbloqueado: '+updated.name);
  };
  const onDeleteDemos=async()=>{
    if(!window.confirm('¿Eliminar todos los perfiles y publicaciones de demostración? Esta acción no se puede deshacer.'))return;
    const newP=profiles.filter(p=>!p.isDemo);
    const newPosts=posts.filter(p=>!p.isDemo);
    setProfiles(newP);setPosts(newPosts);
    try{await DB.set('profiles',newP,true);await DB.set('posts',newPosts,true);}catch(e){}
    showToast('Perfiles demo eliminados');
  };
  const onApprove=async(id)=>{
    const np=profiles.map(p=>p.id===id?{...p,status:p.status==='approved'?'pending':'approved',approvedAt:p.status==='approved'?null:fmtDate()}:p);
    setProfiles(np);
    try{await DB.set('profiles',np,true);}catch(e){console.warn('Save error',e);}
    const updated=np.find(p=>p.id===id);
    showToast(updated?.status==='approved'?'✓ Perfil aprobado: '+updated.name:'Perfil pendiente: '+(updated?.name||''));
  };
  const onVerify=async(id)=>{
    const np=profiles.map(p=>p.id===id?{...p,verified:!p.verified}:p);
    setProfiles(np);
    try{await DB.set('profiles',np,true);}catch(e){console.warn('Save error',e);}
    const updated=np.find(p=>p.id===id);
    showToast(updated?.verified?'✓ Perfil verificado: '+updated.name:'Verificación removida');
  };
  const onDelete=async(id)=>{
    const prof=profiles.find(p=>p.id===id);

    if(!window.confirm('¿Eliminar permanentemente a '+prof.name+'?\n\nSe eliminará su perfil de la plataforma y de la base de datos. El usuario podrá registrarse de nuevo con el mismo correo.'))return;

    const np=profiles.filter(p=>p.id!==id);

    try{await DB.set('profiles',np,true);}catch(e){}
    /* Remove from Firebase users collection */
    if(_fbReady&&_db&&prof.userId){
      try{await _db.collection('users').doc(prof.userId).delete();console.log('User doc deleted from Firebase');}catch(e){console.warn('Could not delete user doc:',e);}
      try{await _db.collection('nodo_pending').doc(prof.userId).delete();}catch(_){}
    }
    /* Note: Firebase Auth account requires Admin SDK to delete — cannot be done from browser */
    /* The user CAN re-register with the same email after deletion */
    showToast('✓ '+prof.name+' eliminado de la plataforma y la base de datos');
  };
  const onLogin=u=>{setCurrentUser(u);DB.get(u.role==='admin'?'notifs:admin':'notifs:'+u.id).then(n=>setNotifs(n||[])).catch(()=>{});};
  const onLogout=async()=>{await DB.del('session');setCurrentUser(null);setNotifs([]);showToast('Sesión cerrada');};

  if(!loaded)return React.createElement('div',{style:{position:'fixed',inset:0,background:'#faf8f5',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}},React.createElement('div',{style:{fontFamily:'Playfair Display,serif',fontSize:32,color:'#c4611e',letterSpacing:4}},'NODO'),React.createElement('div',{className:'spin',style:{width:28,height:28}}));

    landing&&React.createElement(Landing,{onSelect:handleLanding}),

      view==='home'&&React.createElement(HomePage,{profiles,posts,go,setProf:setSelProf,currentUser,onAuthClick}),

/* ── BACK BUTTON HANDLER ── */
(function(){
  let historyDepth = 0;
  const views = ['home','map','dir','profile','create','chat','admin','terms'];

  /* Push a state on every view change so we have history to go back through */
  function pushState(view){
    history.pushState({view, depth: ++historyDepth}, '', '');
  }
  /* Expose so React App can call it */
  window.__nodoPushState = pushState;

  window.addEventListener('popstate', function(e){
    const state = e.state;

    /* If we have React app state, go back within the app */
    if(window.__nodoGoBack && typeof window.__nodoGoBack === 'function'){
      window.__nodoGoBack(state);
      /* Re-push so we always have a state to pop */
      history.pushState({view: state?.view || 'home', depth: historyDepth}, '', '');
      return;
    }

    /* No more history — ask before exit */
    const confirmExit = window.confirm('¿Quieres salir de NODO ART?');
    if(confirmExit){
      history.go(-1);
    } else {
      history.pushState({}, '', '');
    }
  });

  /* Initial push so there's always a state */
  history.pushState({view:'home', depth:0}, '', '');
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', async()=>{
    try{
      const reg = await navigator.serviceWorker.register('sw.js', {scope:'./'});
      console.log('SW registrado ✓', reg.scope);
      window.__swReg = reg;
    }catch(e){ console.warn('SW error:', e); }
  });
}

/* ── PWA: Install prompt (A2HS) ── */
let deferredPrompt = null;

/* Show install banner immediately on mobile if not dismissed and not installed */
function checkShowInstallBanner(){
  const isInstalled = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  const dismissed = localStorage.getItem('nodo_install_dismissed');
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  if(!isInstalled && !dismissed && isMobile){
    setTimeout(showInstallBanner, 2000);
  }
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  checkShowInstallBanner();
});

/* Also show on iOS where beforeinstallprompt doesn't fire */
window.addEventListener('load', () => {
  const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
  const isInstalled = window.navigator.standalone;
  if(isIOS && !isInstalled && !localStorage.getItem('nodo_install_dismissed')){
    setTimeout(showInstallBanner, 2000);
  }
});

function showInstallBanner(){
  if(document.getElementById('nodo-install-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'nodo-install-banner';
  banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:3px solid #f97316;border-radius:24px 24px 0 0;padding:20px 20px 32px;z-index:9999;box-shadow:0 -8px 40px rgba(0,0,0,.2);display:flex;align-items:center;gap:14px;font-family:museo-sans,sans-serif;animation:slideUp .4s cubic-bezier(.16,1,.3,1);';
  const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
  const iosGuide = isIOS ? `<div style="margin-top:10px;padding:10px 12px;background:#f8fafc;border-radius:10px;font-size:12px;color:#4b5563;line-height:1.6;border:1px solid #e2e8f0;"><strong>En Safari:</strong> toca <strong>⬆️ Compartir</strong> → <strong>"Agregar a pantalla de inicio"</strong></div>` : '';
  const actionBtn = isIOS ? '' : `<button onclick="installApp()" style="padding:10px 18px;border:none;border-radius:12px;background:linear-gradient(135deg,#f97316,#dc2626);color:#fff;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;box-shadow:0 4px 14px rgba(249,115,22,.4);">Instalar gratis</button>`;
  banner.innerHTML = `
    <div style="flex:1;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;">
        <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#f97316,#dc2626);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(249,115,22,.4);">
          <div style="width:14px;height:14px;border-radius:50%;background:#fff;"></div>
        </div>
        <div>
          <div style="font-weight:800;font-size:16px;color:#111;">📲 Instala NODO ART</div>
          <div style="font-size:12px;color:#6b7280;margin-top:2px;">App gratis · Sin App Store · Notificaciones de chat</div>
        </div>
        <button onclick="dismissInstall()" style="padding:6px;border:none;background:#f1f5f9;border-radius:50%;color:#9ca3af;font-size:16px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">×</button>
      </div>
      ${iosGuide}
      ${actionBtn ? `<div style="margin-top:12px;">${actionBtn}</div>` : ''}
    </div>
  `;
  document.body.appendChild(banner);
}

window.installApp = async function(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  if(result.outcome === 'accepted'){
    console.log('NODO ART instalado ✓');
    document.getElementById('nodo-install-banner')?.remove();
  }
  deferredPrompt = null;
};

window.dismissInstall = function(){
  localStorage.setItem('nodo_install_dismissed','1');
  document.getElementById('nodo-install-banner')?.remove();
};

window.addEventListener('appinstalled', ()=>{
  console.log('App instalada');
  document.getElementById('nodo-install-banner')?.remove();
  deferredPrompt = null;
});

/* ── PUSH NOTIFICATIONS ── */
window.requestPushPermission = async function(userId){
  if(!('Notification' in window)){ alert('Tu navegador no soporta notificaciones.'); return false; }
  if(!('serviceWorker' in navigator)){ return false; }
  const perm = await Notification.requestPermission();
  if(perm !== 'granted'){ return false; }
  /* Store permission in Firebase so we know this user opted in */
  if(_fbReady && userId){
    try{
      await _db.collection('users').doc(userId).update({pushEnabled:true,pushUpdatedAt:Date.now()});
    }catch(e){}
  }
  /* Show local test notification */
  const reg = window.__swReg || await navigator.serviceWorker.ready;
  reg.showNotification('NODO ART 🔥', {
    body: '¡Notificaciones activadas! Te avisaremos cuando alguien te escriba.',
    icon: 'https://via.placeholder.com/192x192/f97316/ffffff?text=N',
    badge: 'https://via.placeholder.com/72x72/f97316/ffffff?text=N',
    vibrate: [200,100,200],
    tag: 'nodo-welcome',
  });
  return true;
};

/* Send local notification when new chat message arrives (foreground) */
window.sendLocalNotif = function(title, body, url){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  /* Only notify if page is not visible */
  if(!document.hidden) return;
  navigator.serviceWorker.ready.then(reg => {
    reg.showNotification(title, {
      body, icon:'https://via.placeholder.com/192x192/f97316/ffffff?text=N',
      badge:'https://via.placeholder.com/72x72/f97316/ffffff?text=N',
      tag:'nodo-chat', renotify:true, vibrate:[200,100,200],
      data:{url: url||location.href}
    });
  });
};
